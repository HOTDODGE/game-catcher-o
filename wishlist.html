<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 위시리스트 - GameCatcher</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://fonts.googleapis.com https://cdnjs.cloudflare.com https://accounts.google.com 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://accounts.google.com; img-src * data:; connect-src 'self' https://www.cheapshark.com https://store.steampowered.com https://api.allorigins.win https://corsproxy.io https://translate.googleapis.com https://accounts.google.com https://proxy.cors.sh; font-src 'self' https://fonts.gstatic.com; frame-src https://accounts.google.com;">
    <meta name="referrer" content="no-referrer-when-downgrade">
    
    <!-- Performance Optimizations -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://accounts.google.com">

    <link rel="stylesheet" href="style.css">
    <style>
        .wishlist-header {
            padding: var(--spacing-12) 0 var(--spacing-8);
            text-align: center;
        }
        .empty-state {
            padding: var(--spacing-16) 0;
            text-align: center;
            color: var(--text-muted);
        }
        .empty-icon {
            font-size: 4rem;
            margin-bottom: var(--spacing-4);
            display: block;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container flex justify-between items-center">
            <div class="logo">
                <span class="logo-icon">🎮</span> <a href="index.html" style="color: inherit;" data-ko="GameCatcher" data-en="GameCatcher">GameCatcher</a>
            </div>
            <button class="menu-toggle" aria-label="Toggle Navigation">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <div class="nav-menu">
                <ul class="nav-links">
                    <li><a href="index.html" data-ko="홈" data-en="Home">홈</a></li>
                    <li><a href="all-games.html" data-ko="모든 게임 (검색)" data-en="All Games (Search)">모든 게임 (검색)</a></li>
                    <li><a href="deep-discounts.html" data-ko="파격 할인" data-en="Deep Discounts">파격 할인</a></li>
                    <li><a href="wishlist.html" class="active" data-ko="위시리스트" data-en="Wishlist">위시리스트</a></li>
                </ul>
                <div class="flex nav-auth" style="align-items: center; gap: var(--spacing-3);">
                    <button class="nav-icon-btn" title="언어 변경: English / 한국어" onclick="toggleLanguage()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="2" y1="12" x2="22" y2="12"></line>
                            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                        </svg>
                        <span style="font-size: 0.6rem; font-weight: bold; line-height: 1;">KO</span>
                    </button>
                    <div id="g_id_signin"></div>
                    <div id="userProfile" class="user-profile-nav" style="display: none;">
                        <img id="userAvatar" src="" alt="Profile" class="avatar-sm">
                        <span id="userName" class="user-name"></span>
                        <button id="logoutBtn" class="btn btn-ghost btn-sm" data-ko="로그아웃" data-en="Logout">로그아웃</button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <header class="wishlist-header">
        <div class="container">
            <h1 data-ko="내 위시리스트" data-en="My Wishlist">내 위시리스트</h1>
            <p class="text-muted mt-2" data-ko="관심 있는 게임들을 한눈에 확인하고 가격 변동을 체크하세요." data-en="Track your favorite games and check for price drops in one place.">관심 있는 게임들을 한눈에 확인하고 가격 변동을 체크하세요.</p>
        </div>
    </header>

    <main class="container mb-12">
        <div id="wishlistGrid" class="grid grid-4 grid-container">
            <!-- Items injected by wishlist.js -->
        </div>
        
        <div id="emptyState" class="empty-state" style="display: none;">
            <span class="empty-icon">❤️</span>
            <h2 data-ko="위시리스트가 비어 있습니다" data-en="Your wishlist is empty">위시리스트가 비어 있습니다</h2>
            <p class="mt-2 mb-6" data-ko="할인 중인 게임들을 구경하고 마음에 드는 게임을 추가해보세요!" data-en="Browse discounted games and add your favorites to get started!">할인 중인 게임들을 구경하고 마음에 드는 게임을 추가해보세요!</p>
            <a href="all-games.html" class="btn btn-primary" data-ko="게임 둘러보기" data-en="Browse Games">게임 둘러보기</a>
        </div>
    </main>

    <footer>
        <div class="container text-center">
            <p data-ko="&copy; 2026 GameCatcher. 모든 권리 보유." data-en="&copy; 2026 GameCatcher. All rights reserved.">&copy; 2026 GameCatcher. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js" crossorigin="anonymous"></script>
    <script src="https://accounts.google.com/gsi/client" async defer onload="initGoogleLogin()"></script>
    <script src="translation.js"></script>
    <script src="navbar.js"></script>
    <script type="module" src="auth.js"></script>
    <script type="module" src="wishlist.js"></script>
</body>
</html>
