[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://fonts.googleapis.com https://cdnjs.cloudflare.com https://accounts.google.com 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://accounts.google.com; img-src * data:; media-src 'self' https://video.cloudflare.steamstatic.com https://video.akamai.steamstatic.com https://cdn.cloudflare.steamstatic.com https://cdn.akamai.steamstatic.com https://shared.akamai.steamstatic.com; connect-src 'self' https://www.cheapshark.com https://store.steampowered.com https://api.allorigins.win https://corsproxy.io https://translate.googleapis.com https://accounts.google.com https://proxy.cors.sh https://api.codetabs.com; font-src 'self' https://fonts.gstatic.com; frame-src https://accounts.google.com;"
