[build]
  publish = "."
  functions = "netlify/functions"

# 멀티 페이지 앱(MPA)이므로 SPA용 리다이렉트는 제거하거나 404 처리를 위해 남겨둡니다.
# 여기서는 각 페이지(.html)로 직접 연결되도록 기본 설정을 따릅니다.

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://fonts.googleapis.com https://cdnjs.cloudflare.com https://accounts.google.com 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://accounts.google.com; img-src * data:; media-src 'self' https://video.cloudflare.steamstatic.com https://video.akamai.steamstatic.com https://cdn.cloudflare.steamstatic.com https://cdn.akamai.steamstatic.com https://shared.akamai.steamstatic.com; connect-src 'self' https://www.cheapshark.com https://store.steampowered.com https://api.allorigins.win https://corsproxy.io https://translate.googleapis.com https://accounts.google.com https://proxy.cors.sh https://api.codetabs.com https://ipapi.co https://open.er-api.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com; frame-src https://accounts.google.com;"
